
<style>
@keyframes flowDown { 0%{stroke-dashoffset:60} 100%{stroke-dashoffset:0} }
@keyframes flowRight { 0%{stroke-dashoffset:80} 100%{stroke-dashoffset:0} }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
@keyframes critical { 0%,100%{fill-opacity:0.15} 50%{fill-opacity:0.4} }
.flow-v { stroke-dasharray:8 4; animation: flowDown 1.2s linear infinite; }
.flow-h { stroke-dasharray:8 4; animation: flowRight 1.4s linear infinite; }
.flow-alert { stroke-dasharray:6 3; animation: flowRight 0.6s linear infinite; }
.pulse-dot { animation: pulse 1.8s ease-in-out infinite; }
.critical-bg { animation: critical 2s ease-in-out infinite; }
.layer-btn { cursor:pointer; }
.layer-btn rect { transition: opacity 0.15s; }
.layer-btn:hover rect { opacity: 0.85; }
#info-panel { transition: opacity 0.2s; }
</style>
<svg width="100%" viewBox="0 0 680 620" role="img">
<title>Smart Manufacturing Edge Architecture</title>
<desc>Three-tier architecture: Field (sensor + MCU), Edge (Raspberry Pi gateway), Cloud (MQTT + ClickHouse + Grafana) with data compression and anomaly detection flows</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
  <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- Tier labels (left margin) -->
<text class="ts" x="28" y="155" text-anchor="middle" fill="var(--t)" opacity="0.5" transform="rotate(-90,28,155)">FIELD</text>
<text class="ts" x="28" y="340" text-anchor="middle" fill="var(--t)" opacity="0.5" transform="rotate(-90,28,340)">EDGE</text>
<text class="ts" x="28" y="530" text-anchor="middle" fill="var(--t)" opacity="0.5" transform="rotate(-90,28,530)">CLOUD</text>

<!-- ═══ TIER 1: FIELD ═══ -->
<rect x="55" y="55" width="590" height="170" rx="12" fill="none" stroke="var(--b)" stroke-width="0.5" stroke-dasharray="4 4"/>

<!-- Sensor node -->
<g class="layer-btn" onclick="showInfo('sensor')">
  <rect x="75" y="90" width="150" height="100" rx="8" stroke-width="0.5" class="c-teal" fill-opacity="0"/>
  <rect x="75" y="90" width="150" height="100" rx="8" stroke-width="0.5" class="c-teal"/>
  <text class="th" x="150" y="130" text-anchor="middle">Датчик вибрации</text>
  <text class="ts" x="150" y="148" text-anchor="middle">Пьезоэлектрический</text>
  <text class="ts" x="150" y="164" text-anchor="middle">10 кГц, 16-bit ADC</text>
</g>

<!-- ADC waveform indicator (decorative) -->
<g opacity="0.4">
  <polyline fill="none" stroke="#1D9E75" stroke-width="1" points="105,175 112,170 116,180 122,162 128,185 134,168 140,178 146,172 152,180 158,165 164,178 170,172 176,180 182,170 188,177"/>
</g>

<!-- MCU node -->
<g class="layer-btn" onclick="showInfo('mcu')">
  <rect x="265" y="90" width="150" height="100" rx="8" stroke-width="0.5" class="c-teal"/>
  <text class="th" x="340" y="128" text-anchor="middle">Микроконтроллер</text>
  <text class="ts" x="340" y="146" text-anchor="middle">ESP32 / STM32</text>
  <text class="ts" x="340" y="164" text-anchor="middle">Ring buffer, DMA</text>
</g>

<!-- Ring buffer visual -->
<g transform="translate(290,158)" opacity="0.5">
  <circle cx="18" cy="8" r="10" fill="none" stroke="#1D9E75" stroke-width="1"/>
  <path d="M8,8 A10,10 0 1,1 28,8" fill="none" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round"/>
</g>

<!-- Arrow: sensor → MCU (analog) -->
<line x1="225" y1="140" x2="263" y2="140" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="244" y="133" text-anchor="middle" fill="var(--s)">аналог</text>

<!-- Arrow: MCU → down (SPI/I2C) -->
<line class="flow-v" x1="340" y1="190" x2="340" y2="240" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="358" y="220" fill="var(--s)">SPI/I2C</text>

<!-- ═══ TIER 2: EDGE ═══ -->
<rect x="55" y="245" width="590" height="205" rx="12" fill="none" stroke="var(--b)" stroke-width="0.5" stroke-dasharray="4 4"/>

<!-- Gateway node (main) -->
<g class="layer-btn" onclick="showInfo('gateway')">
  <rect x="220" y="270" width="240" height="80" rx="8" stroke-width="0.5" class="c-purple"/>
  <text class="th" x="340" y="300" text-anchor="middle">Промышленный шлюз</text>
  <text class="ts" x="340" y="318" text-anchor="middle">Raspberry Pi 4/5</text>
  <text class="ts" x="340" y="334" text-anchor="middle">Go / C++ edge service</text>
</g>

<!-- Pipeline boxes -->
<!-- FFT -->
<g class="layer-btn" onclick="showInfo('fft')">
  <rect x="75" y="375" width="130" height="60" rx="6" stroke-width="0.5" class="c-blue"/>
  <text class="th" x="140" y="399" text-anchor="middle">FFT</text>
  <text class="ts" x="140" y="416" text-anchor="middle">Feature extraction</text>
</g>

<!-- SDT -->
<g class="layer-btn" onclick="showInfo('sdt')">
  <rect x="235" y="375" width="130" height="60" rx="6" stroke-width="0.5" class="c-blue"/>
  <text class="th" x="300" y="399" text-anchor="middle">SDT</text>
  <text class="ts" x="300" y="416" text-anchor="middle">Compressor 50-100×</text>
</g>

<!-- Anomaly detector -->
<g class="layer-btn" onclick="showInfo('anomaly')">
  <rect x="395" y="375" width="130" height="60" rx="6" stroke-width="0.5" class="c-coral"/>
  <text class="th" x="460" y="399" text-anchor="middle">Anomaly Det.</text>
  <text class="ts" x="460" y="416" text-anchor="middle">TinyML Autoencoder</text>
</g>

<!-- Alert node (local) -->
<g class="layer-btn" onclick="showInfo('alert')">
  <rect x="550" y="375" width="90" height="60" rx="6" stroke-width="0.5" class="c-red"/>
  <rect x="550" y="375" width="90" height="60" rx="8" class="critical-bg" fill="#E24B4A"/>
  <text class="th" x="595" y="399" text-anchor="middle">ALERT</text>
  <text class="ts" x="595" y="416" text-anchor="middle">Local relay</text>
</g>
<circle class="pulse-dot" cx="634" cy="379" r="5" fill="#E24B4A"/>

<!-- Arrows within edge tier -->
<line x1="340" y1="350" x2="215" y2="378" stroke="var(--s)" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="340" y1="350" x2="300" y2="375" stroke="var(--s)" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="340" y1="350" x2="450" y2="375" stroke="var(--s)" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Alert arrow (fast, red) -->
<line class="flow-alert" x1="525" y1="405" x2="550" y2="405" stroke="#E24B4A" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ═══ TIER 3: CLOUD ═══ -->
<rect x="55" y="470" width="590" height="130" rx="12" fill="none" stroke="var(--b)" stroke-width="0.5" stroke-dasharray="4 4"/>

<!-- MQTT broker -->
<g class="layer-btn" onclick="showInfo('mqtt')">
  <rect x="75" y="495" width="130" height="80" rx="8" stroke-width="0.5" class="c-amber"/>
  <text class="th" x="140" y="527" text-anchor="middle">MQTT Broker</text>
  <text class="ts" x="140" y="545" text-anchor="middle">EMQX / Mosquitto</text>
  <text class="ts" x="140" y="561" text-anchor="middle">WAN transport</text>
</g>

<!-- ClickHouse -->
<g class="layer-btn" onclick="showInfo('clickhouse')">
  <rect x="245" y="495" width="130" height="80" rx="8" stroke-width="0.5" class="c-amber"/>
  <text class="th" x="310" y="527" text-anchor="middle">ClickHouse</text>
  <text class="ts" x="310" y="545" text-anchor="middle">Time-series DB</text>
  <text class="ts" x="310" y="561" text-anchor="middle">Protobuf ingest</text>
</g>

<!-- Grafana -->
<g class="layer-btn" onclick="showInfo('grafana')">
  <rect x="415" y="495" width="130" height="80" rx="8" stroke-width="0.5" class="c-amber"/>
  <text class="th" x="480" y="527" text-anchor="middle">Grafana</text>
  <text class="ts" x="480" y="545" text-anchor="middle">Dashboards</text>
  <text class="ts" x="480" y="561" text-anchor="middle">Anomaly timeline</text>
</g>

<!-- Arrows within cloud -->
<line class="flow-h" x1="205" y1="535" x2="243" y2="535" stroke="#BA7517" stroke-width="1.2" marker-end="url(#arrow)"/>
<line class="flow-h" x1="375" y1="535" x2="413" y2="535" stroke="#BA7517" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Edge → Cloud arrow (SDT normal path) -->
<line class="flow-v" x1="300" y1="435" x2="300" y2="468" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="316" y="455" fill="var(--s)">protobuf</text>
<text class="ts" x="316" y="467" fill="var(--s)">~1 msg/min</text>

<!-- Info panel -->
<rect id="info-bg" x="560" y="470" width="85" height="0" rx="6" fill="var(--bg2)" stroke="var(--b)" stroke-width="0.5" opacity="0"/>
</svg>

<div id="info-panel" style="margin:12px 0 0;padding:10px 14px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);font-size:13px;color:var(--color-text-secondary);min-height:44px;display:flex;align-items:center;gap:8px">
  <i class="ti ti-info-circle" aria-hidden="true" style="font-size:16px;flex-shrink:0;color:var(--color-text-tertiary)"></i>
  <span id="info-text">Кликни на любой компонент — увидишь детали</span>
</div>

<script>
const info = {
  sensor: '🎯 <b>Датчик вибрации</b> — пьезоэлектрический элемент снимает 10 000 точек/с. Аналоговый сигнал подаётся на ADC микроконтроллера.',
  mcu: '⚙️ <b>ESP32 / STM32</b> — оцифровывает сигнал через DMA прямо в кольцевой буфер в ОЗУ. Нет CPU overhead на копирование данных.',
  gateway: '🖥️ <b>Raspberry Pi</b> — сердце Edge-уровня. Go-сервис читает буфер по SPI/I2C, прогоняет через конвейер FFT → SDT → Autoencoder за &lt;100 мс.',
  fft: '📊 <b>FFT (Fast Fourier Transform)</b> — переводит сырой сигнал из временного домена в частотный. Результат — «отпечаток» спектра вибрации. Типичный размер окна: 1024 семплов.',
  sdt: '🗜️ <b>Swinging Door Trending</b> — промышленный алгоритм сжатия временных рядов. Отбрасывает точки, которые «вписываются» в линейный тренд. Сжатие 50-100× в норме.',
  anomaly: '🧠 <b>TinyML Autoencoder</b> — знает «здоровый» профиль вибрации. Если reconstruction error превышает порог → аномалия. Модель занимает &lt;500 KB RAM.',
  alert: '🚨 <b>Критический алерт</b> — мгновенный MQTT пакет со статусом CRITICAL в локальную сеть. Может физически остановить станок через релейный выход (GPIO).',
  mqtt: '📡 <b>MQTT Broker (EMQX)</b> — лёгкий pub/sub протокол для IoT. QoS 1 гарантирует доставку. Нормальные данные: ~1 пакет/мин. В аварии — Full Dump.',
  clickhouse: '🗄️ <b>ClickHouse</b> — колоночная OLAP-база, идеальна для телеметрии. Пишет protobuf-пакеты с агрегатами (RMS, пиковые частоты, метки аномалий).',
  grafana: '📈 <b>Grafana</b> — на дашборде видно: ровная сжатая линия в норме и «взрыв» детализированных данных в момент аварии. Наглядно для PoC-демо.',
};

function showInfo(key) {
  const el = document.getElementById('info-text');
  if (info[key]) el.innerHTML = info[key];
}
</script>
