# telegraf.conf — MQTT subscriber → ClickHouse writer
#
# Subscribes to:
#   sm/telemetry/<sensor_id>   JSON telemetry batches from edge-filter
#   sm/anomaly/<sensor_id>     JSON anomaly events from edge-filter
#
# Writes to:
#   iot.telemetry       (raw + compressed vibration points)
#   iot.anomaly_events  (state-change events)

[agent]
  interval          = "5s"
  round_interval    = true
  metric_batch_size = 5000
  metric_buffer_limit = 50000
  flush_interval    = "5s"
  hostname          = "telegraf"
  omit_hostname     = false

# ── Input: MQTT telemetry topic ───────────────────────────────────────────
[[inputs.mqtt_consumer]]
  servers = ["${MQTT_BROKER}"]

  # Wildcard: sm/telemetry/bearing_01, sm/telemetry/bearing_02, ...
  topics = ["sm/telemetry/#"]

  # JSON payload produced by edge-filter (see mqtt/client.go TelemetryMessage)
  data_format = "json_v2"
  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "telemetry"

    # Timestamp comes from the edge device, not from Telegraf ingestion time.
    # This keeps ClickHouse timestamps accurate even with network delay.
    timestamp_path = "ts_ms"
    timestamp_format = "unix_ms"

    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "value"
      type   = "float"
    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "window_rms"
      type   = "float"
    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "sdt_ratio"
      type   = "float"
    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "is_anomaly"
      type   = "int"
    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "sensor_id"

# ── Input: MQTT anomaly events topic ─────────────────────────────────────
[[inputs.mqtt_consumer]]
  servers = ["${MQTT_BROKER}"]
  topics  = ["sm/anomaly/#"]

  data_format = "json_v2"
  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "anomaly_events"
    timestamp_path   = "ts_ms"
    timestamp_format = "unix_ms"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "rms"
      type = "float"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "z_score"
      type = "float"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "baseline_mean"
      type = "float"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "baseline_stddev"
      type = "float"
    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "sensor_id"
    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "event_type"

# ── Output: ClickHouse ────────────────────────────────────────────────────
[[outputs.clickhouse]]
  dsn      = "${CLICKHOUSE_DSN}"
  database = "iot"

  # Map Telegraf measurement names → ClickHouse table names.
  # Columns must match the DDL in clickhouse/init.sql.
  [[outputs.clickhouse.tables]]
    measurement = "telemetry"
    table       = "telemetry"
    # Rename Telegraf's internal timestamp field to match DDL column name.
    [[outputs.clickhouse.tables.column_mapping]]
      from = "time"
      to   = "ts"

  [[outputs.clickhouse.tables]]
    measurement = "anomaly_events"
    table       = "anomaly_events"
    [[outputs.clickhouse.tables.column_mapping]]
      from = "time"
      to   = "ts"
