[agent]
  interval            = "5s"
  round_interval      = true
  metric_batch_size   = 1000
  metric_buffer_limit = 10000
  flush_interval      = "5s"
  omit_hostname       = false

[[inputs.mqtt_consumer]]
  servers            = ["${MQTT_BROKER}"]
  topics             = ["sm/telemetry/#"]
  persistent_session = false
  qos                = 1
  connection_timeout = "30s"
  data_format        = "json_v2"
  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "telemetry"
    timestamp_path   = "ts_ms"
    timestamp_format = "unix_ms"
    timestamp_timezone = "UTC"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "value"
      type = "float"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "window_rms"
      type = "float"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "sdt_ratio"
      type = "float"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "is_anomaly"
      type = "int"
    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "sensor_id"

[[inputs.mqtt_consumer]]
  servers            = ["${MQTT_BROKER}"]
  topics             = ["sm/anomaly/#"]
  persistent_session = false
  qos                = 1
  connection_timeout = "30s"
  data_format        = "json_v2"
  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "anomaly_events"
    timestamp_path   = "ts_ms"
    timestamp_format = "unix_ms"
    timestamp_timezone = "UTC"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "rms"
      type = "float"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "z_score"
      type = "float"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "baseline_mean"
      type = "float"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "baseline_stddev"
      type = "float"
    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "sensor_id"
    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "event_type"

# Both measurements go into telemetry_raw; ClickHouse MVs parse and route them.
[[outputs.http]]
  url         = "http://default:clickhouse@clickhouse:8123/?query=INSERT+INTO+iot.telemetry_raw+FORMAT+JSONAsString"
  method      = "POST"
  data_format = "json"
  json_timestamp_units = "1ms"
