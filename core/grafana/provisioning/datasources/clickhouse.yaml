apiVersion: 1

datasources:
  - name: ClickHouse
    type: grafana-clickhouse-datasource
    uid: clickhouse_iot
    isDefault: true
    jsonData:
      host: clickhouse
      port: 8123
      protocol: http
      database: iot
      username: default
      defaultDatabase: iot
    secureJsonData:
      password: "clickhouse"
    editable: true
